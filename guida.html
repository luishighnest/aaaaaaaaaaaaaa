<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PZ8 - Guida TV</title>
  <meta name="description" content="Guida TV completa dei canali PZ8">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body {
      background: #07070d;
      background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.04) 0%, transparent 40%),
        radial-gradient(circle at bottom left, rgba(2, 6, 23, 0.8) 0%, transparent 50%);
      color: var(--text-primary);
      font-family: var(--font-main);
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .guida-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100vh;
    }

    /* Sidebar */
    .guida-sidebar {
      background: rgba(13, 13, 18, 0.8);
      backdrop-filter: blur(24px) saturate(1.2);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .guida-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .guida-brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00f2fe, #0072ff);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #07070d;
    }

    .guida-brand-text {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .guida-brand-text span {
      color: #00f2fe;
    }

    .guida-search-wrapper {
      padding: 1rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .guida-search-container {
      position: relative;
      width: 100%;
    }

    .guida-search-container i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .guida-search-input {
      width: 100%;
      background: #12121a;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      transition: var(--transition);
    }

    .guida-search-input:focus {
      border-color: #00f2fe;
      box-shadow: 0 0 8px rgba(0, 242, 254, 0.2);
    }

    .guida-sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .guida-sidebar-content::-webkit-scrollbar {
      width: 4px;
    }

    .guida-sidebar-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
    }

    .guida-cat-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .guida-cat-header {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding-left: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 0.2rem;
    }

    .guida-ch-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.02);
      transition: var(--transition);
    }

    .guida-ch-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .guida-ch-item.active {
      background: linear-gradient(90deg, rgba(0, 242, 254, 0.15) 0%, rgba(13, 13, 18, 0.6) 100%);
      border-color: rgba(0, 242, 254, 0.3);
      color: #fff;
      box-shadow: inset 4px 0 0 #00f2fe;
    }

    .guida-ch-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    /* Main Content */
    .guida-main {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .guida-header {
      height: 70px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10, 10, 15, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      flex-shrink: 0;
    }

    .guida-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .guida-header-ch-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }

    .guida-header-ch-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .guida-btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1.2rem;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #00f2fe;
      border: 1px solid rgba(0, 242, 254, 0.3);
      background: rgba(0, 242, 254, 0.05);
      cursor: pointer;
      transition: var(--transition);
    }

    .guida-btn-back:hover {
      background: #00f2fe;
      color: #07070d;
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .guida-content-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .guida-content-area::-webkit-scrollbar {
      width: 6px;
    }

    .guida-content-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }

    /* Program Timeline Card */
    .timeline-container {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .timeline-item {
      display: flex;
      gap: 2rem;
      padding: 1.4rem;
      border-radius: var(--radius);
      background: rgba(18, 18, 26, 0.6);
      border: 1px solid var(--border-subtle);
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }

    .timeline-item:hover {
      background: rgba(22, 22, 32, 0.8);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .timeline-item.live {
      background: linear-gradient(135deg, rgba(0, 230, 118, 0.06) 0%, rgba(18, 18, 26, 0.8) 100%);
      border-color: rgba(0, 230, 118, 0.25);
      box-shadow: 0 8px 30px rgba(0, 230, 118, 0.03);
    }

    .timeline-item.live::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #00e676, #00b0ff);
    }

    .timeline-item.past {
      opacity: 0.45;
    }

    .timeline-time {
      width: 80px;
      font-family: var(--font-alt);
      font-size: 1.15rem;
      font-weight: 800;
      color: #60a5fa;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .timeline-item.live .timeline-time {
      color: #00e676;
    }

    .timeline-item.past .timeline-time {
      color: var(--text-muted);
    }

    .timeline-details {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .timeline-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin: 0;
    }

    .timeline-item.live .timeline-title {
      font-size: 1.25rem;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(0, 230, 118, 0.1);
    }

    .timeline-item.past .timeline-title {
      color: var(--text-secondary);
    }

    .timeline-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
      width: fit-content;
    }

    .timeline-badge.live {
      background: rgba(0, 230, 118, 0.1);
      color: #00e676;
      border: 1px solid rgba(0, 230, 118, 0.2);
    }

    .timeline-badge.upcoming {
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.2);
    }

    .timeline-badge.past {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .timeline-progress-container {
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .timeline-progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .timeline-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e676, #00b0ff);
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(0, 230, 118, 0.4);
    }

    .timeline-progress-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 700;
      flex-shrink: 0;
    }

    .guida-no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 5rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }

    .guida-no-data i {
      font-size: 3.5rem;
      opacity: 0.4;
    }

    .guida-no-data p {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 0;
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .guida-layout {
        grid-template-columns: 280px 1fr;
      }
    }

    @media (max-width: 768px) {
      .guida-layout {
        grid-template-columns: 1fr;
      }

      .guida-sidebar {
        display: none;
      }

      .guida-sidebar.show-mobile {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 1000;
      }
    }
  </style>
</head>

<body>
  <div class="guida-layout">
    <!-- Sidebar for channel selection -->
    <aside class="guida-sidebar" id="guida-sidebar">
      <div class="guida-brand">
        <div class="guida-brand-icon"><i class="ph ph-calendar"></i></div>
        <div class="guida-brand-text"><span></span> Guida TV</div>
      </div>
      <div class="guida-search-wrapper">
        <div class="guida-search-container">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" id="ch-search" class="guida-search-input" placeholder="Cerca canale o evento...">
        </div>
      </div>
      <div class="guida-sidebar-content" id="guida-sidebar-content">
        <!-- Dynamic Category-wise Channel Listing -->
      </div>
    </aside>

    <!-- Main Schedule Panel -->
    <main class="guida-main">
      <header class="guida-header">
        <div class="guida-header-left">
          <div class="guida-header-ch-icon" id="header-ch-icon"></div>
          <h1 class="guida-header-ch-name" id="header-ch-name">Seleziona Canale</h1>
        </div>
        <a id="btn-back" href="index.html" class="guida-btn-back">
          <i class="ph ph-arrow-left"></i> Torna al Player
        </a>
      </header>

      <div class="guida-content-area" id="guida-schedule">
        <!-- Schedule details populated dynamically -->
      </div>
    </main>
  </div>

  <script src="js/channels_v2.js?v=ClearCacheGuidaV7"></script>
  <script>
    let epgData = [];
    let epgMap = new Map();
    let currentChannel = null;

    // Parse URL parameter to get initial channel
    const params = new URLSearchParams(window.location.search);
    let urlChId = parseInt(params.get('id'));

    // Set initial channel
    if (urlChId) {
      currentChannel = getChannelById(urlChId);
    }
    if (!currentChannel) {
      currentChannel = CHANNELS[0];
    }

    // Update back button href
    document.getElementById('btn-back').href = `index.html?id=${currentChannel.id}`;

    // Helper functions for time conversion
    function timeToMinutes(timeStr) {
      if (!timeStr || !timeStr.includes(':')) return 0;
      const [hours, minutes] = timeStr.split(':').map(Number);
      return (hours * 60) + minutes;
    }

    // Populate Sidebar Category Sections and Channels
    function renderSidebar(searchQuery = '') {
      const container = document.getElementById('guida-sidebar-content');
      if (!container) return;
      container.innerHTML = '';

      const query = searchQuery.toLowerCase().trim();

      // Group channels by category
      const categoriesMap = {};
      Object.keys(CATEGORIES).forEach(key => {
        if (key === 'all') return;
        categoriesMap[key] = [];
      });

      CHANNELS.forEach(ch => {
        let matches = false;
        
        if (!query) {
          matches = true;
        } else {
          const chNameMatch = ch.name.toLowerCase().includes(query);
          const chCatMatch = ch.cat.toLowerCase().includes(query);
          const catLabelMatch = (CATEGORIES[ch.cat] && CATEGORIES[ch.cat].label.toLowerCase().includes(query));
          
          if (chNameMatch || chCatMatch || catLabelMatch) {
            matches = true;
          } else {
            // Controlla i programmi EPG
            const channelEpgObj = epgMap ? epgMap.get(ch.name.toUpperCase()) : null;
            if (channelEpgObj && channelEpgObj.programmi) {
              matches = channelEpgObj.programmi.some(p => p.titolo.toLowerCase().includes(query));
            }
          }
        }

        if (!matches) return;

        if (categoriesMap[ch.cat]) {
          categoriesMap[ch.cat].push(ch);
        }
      });

      // Render each Category that has matching channels
      Object.keys(CATEGORIES).forEach(key => {
        if (key === 'all') return;
        const channels = categoriesMap[key];
        if (!channels || channels.length === 0) return;

        const catMeta = CATEGORIES[key];
        const catSection = document.createElement('div');
        catSection.className = 'guida-cat-section';

        const header = document.createElement('div');
        header.className = 'guida-cat-header';
        header.textContent = catMeta.label;
        catSection.appendChild(header);

        channels.forEach(ch => {
          const item = document.createElement('div');
          const isSelected = ch.id === currentChannel.id;
          item.className = 'guida-ch-item' + (isSelected ? ' active' : '');

          const catColor = catMeta ? catMeta.color : '#888';

          // Trova l'eventuale programma corrispondente per mostrarlo sotto il nome del canale
          let matchText = '';
          if (query) {
            const chNameMatch = ch.name.toLowerCase().includes(query);
            const chCatMatch = ch.cat.toLowerCase().includes(query);
            const catLabelMatch = (CATEGORIES[ch.cat] && CATEGORIES[ch.cat].label.toLowerCase().includes(query));
            
            if (!chNameMatch && !chCatMatch && !catLabelMatch) {
              const channelEpgObj = epgMap ? epgMap.get(ch.name.toUpperCase()) : null;
              if (channelEpgObj && channelEpgObj.programmi) {
                const matchedProg = channelEpgObj.programmi.find(p => p.titolo.toLowerCase().includes(query));
                if (matchedProg) {
                  matchText = `${matchedProg.ora} - ${matchedProg.titolo}`;
                }
              }
            }
          }

          item.innerHTML = `
            <div class="guida-ch-item-icon" style="background:${catColor}15;color:${catColor}">
              <i class="ph ${ch.icon}"></i>
            </div>
            <div style="display:flex; flex-direction:column; min-width:0; flex:1;">
              <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${ch.name}</span>
              ${matchText ? `
                <span class="guida-ch-search-match" style="font-size:0.72rem; color:#10b981; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; display:inline-flex; align-items:center; gap:2px;">
                  <i class="ph ph-calendar-check" style="font-size:0.8rem;"></i>
                  ${matchText}
                </span>
              ` : ''}
            </div>
          `;

          item.addEventListener('click', () => {
            selectChannel(ch);
          });

          catSection.appendChild(item);
        });

        container.appendChild(catSection);
      });
    }

    // Handle channel selection
    function selectChannel(ch) {
      currentChannel = ch;

      // Update URL parameters without reloading
      history.pushState({ id: ch.id }, '', `?id=${ch.id}`);

      // Update back button URL
      document.getElementById('btn-back').href = `index.html?id=${ch.id}`;

      // Update sidebar visual active state
      document.querySelectorAll('.guida-ch-item').forEach(el => el.classList.remove('active'));
      renderSidebar(document.getElementById('ch-search').value);

      // Render channel schedule
      renderSchedule();
    }

    // Calculate current live/next programs
    function getChannelEpg(channelName) {
      if (!epgMap || epgMap.size === 0) return { now: null, next: null };

      const channelEpg = epgMap.get(channelName.toUpperCase());
      if (!channelEpg || !channelEpg.programmi || channelEpg.programmi.length === 0) return { now: null, next: null };

      const now = new Date();
      const currentMinutes = (now.getHours() * 60) + now.getMinutes();

      let activeIndex = -1;
      for (let i = 0; i < channelEpg.programmi.length; i++) {
        if (timeToMinutes(channelEpg.programmi[i].ora) <= currentMinutes) {
          activeIndex = i;
        } else {
          break;
        }
      }

      if (activeIndex === -1 && channelEpg.programmi.length > 0) activeIndex = 0;

      return {
        now: channelEpg.programmi[activeIndex],
        activeIndex: activeIndex,
        next: activeIndex + 1 < channelEpg.programmi.length ? channelEpg.programmi[activeIndex + 1] : null
      };
    }

    // Render the schedule details
    function renderSchedule() {
      const headerIcon = document.getElementById('header-ch-icon');
      const headerName = document.getElementById('header-ch-name');
      const scheduleContainer = document.getElementById('guida-schedule');

      if (!currentChannel || !scheduleContainer) return;

      const catMeta = CATEGORIES[currentChannel.cat];
      const catColor = catMeta ? catMeta.color : '#888';

      // Update Header
      headerName.textContent = currentChannel.name;
      if (headerIcon) {
        headerIcon.innerHTML = `<i class="ph ${currentChannel.icon}"></i>`;
        headerIcon.style.color = catColor;
        headerIcon.style.background = catColor + '15';
      }

      scheduleContainer.innerHTML = '';

      const channelName = currentChannel.name.toUpperCase();
      const channelEpg = epgMap.get(channelName);

      if (channelEpg && channelEpg.programmi && channelEpg.programmi.length > 0) {
        const epgStatus = getChannelEpg(currentChannel.name);
        const activeProg = epgStatus.now;
        const activeIndex = epgStatus.activeIndex;

        const timeline = document.createElement('div');
        timeline.className = 'timeline-container';

        const now = new Date();
        const nowMinutes = (now.getHours() * 60) + now.getMinutes();

        channelEpg.programmi.forEach((p, idx) => {
          const isLive = activeProg && p.ora === activeProg.ora && p.titolo === activeProg.titolo && idx === activeIndex;
          const isPast = activeIndex !== -1 && idx < activeIndex;
          const isUpcoming = activeIndex !== -1 && idx > activeIndex;

          const item = document.createElement('div');
          item.className = 'timeline-item' + (isLive ? ' live' : '') + (isPast ? ' past' : '');

          let startMin = timeToMinutes(p.ora);
          let endMin = (idx + 1 < channelEpg.programmi.length)
            ? timeToMinutes(channelEpg.programmi[idx + 1].ora)
            : startMin + 120; // 2 hour fallback for last program

          if (endMin < startMin) endMin += 1440; // overnight programs
          let duration = endMin - startMin;

          let badgeHtml = '';
          if (isLive) {
            badgeHtml = `<span class="timeline-badge live"><i class="ph ph-play-circle"></i> In Onda Ora</span>`;
          } else if (isUpcoming) {
            badgeHtml = `<span class="timeline-badge upcoming"><i class="ph ph-calendar"></i> A Seguire</span>`;
          } else {
            badgeHtml = `<span class="timeline-badge past"><i class="ph ph-check-circle"></i> Trasmesso</span>`;
          }

          let progressHtml = '';
          if (isLive) {
            let adjNow = nowMinutes;
            if (adjNow < startMin && startMin > 1000) adjNow += 1440;

            const rem = Math.max(0, endMin - adjNow);
            const pct = duration > 0 ? Math.min(100, Math.max(0, ((adjNow - startMin) / duration) * 100)) : 100;

            progressHtml = `
              <div class="timeline-progress-container">
                <div class="timeline-progress-bar">
                  <div class="timeline-progress-fill" style="width: ${pct}%"></div>
                </div>
                <span class="timeline-progress-text">${rem > 0 ? 'Mancano ' + rem + ' min' : 'In conclusione'}</span>
              </div>
            `;
          }

          item.innerHTML = `
            <div class="timeline-time">
              <span>${p.ora}</span>
              <span style="font-size: 0.72rem; color: var(--text-muted); font-weight: 500;">
                ${duration >= 60 ? Math.floor(duration / 60) + 'h ' + (duration % 60) + 'm' : duration + 'm'}
              </span>
            </div>
            <div class="timeline-details">
              <h3 class="timeline-title">${p.titolo}</h3>
              ${badgeHtml}
              ${progressHtml}
            </div>
          `;

          timeline.appendChild(item);
        });

        scheduleContainer.appendChild(timeline);
      } else {
        // No schedule found for this channel
        scheduleContainer.innerHTML = `
          <div class="guida-no-data">
            <i class="ph ph-calendar-x"></i>
            <p>Nessun programma disponibile per "${currentChannel.name}"</p>
            <span style="font-size: 0.85rem; color: var(--text-muted);">Questo canale trasmette una programmazione in diretta continua.</span>
          </div>
        `;
      }
    }

    // Load EPG data
    async function fetchEpgData() {
      try {
        let response;
        try {
          response = await fetch('guida_tv_sky.json');
          if (!response.ok) throw new Error("Local file not found");
        } catch (localErr) {
          response = await fetch('https://raw.githubusercontent.com/alex8online/scaisprot/main/guida_tv_sky.json');
          if (!response.ok) throw new Error("Remote fallback failed");
        }

        epgData = await response.json();

        // Build epgMap for quick lookup
        epgMap.clear();
        epgData.forEach(item => {
          if (item.canale) {
            epgMap.set(item.canale.toUpperCase(), item);
          }
        });

        // Initial renders
        renderSidebar();
        renderSchedule();
      } catch (err) {
        console.warn("Errore caricamento EPG:", err);
      }
    }

    // Search channels listener
    document.getElementById('ch-search').addEventListener('input', (e) => {
      renderSidebar(e.target.value);
    });

    // Browser navigation popstate listener (back/forward keys)
    window.addEventListener('popstate', (e) => {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      if (id) {
        const ch = getChannelById(id);
        if (ch) {
          selectChannel(ch);
        }
      }
    });

    // Fetch EPG initially
    fetchEpgData();

    // Auto refresh live progress every 60s
    setInterval(() => {
      if (currentChannel) {
        renderSchedule();
      }
    }, 60000);
  </script>
</body>

</html>
