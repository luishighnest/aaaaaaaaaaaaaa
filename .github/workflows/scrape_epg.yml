name: Scrape EPG

on:
  schedule:
    # Esegue ogni 6 ore (alle 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permette l'avvio manuale dalla scheda Actions di GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Richiesto per poter committare e pushare le modifiche al repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: curl, json, zip

    - name: Esegui Scraper EPG
      run: php cron_scraper.php

    - name: Commit e Push dei dati aggiornati
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add guida_tv_sky.json desc_cache.json
        # Esegui il commit solo se ci sono modifiche effettive
        if git diff --quiet && git diff --staged --quiet; then
          echo "Nessuna modifica rilevata nei dati EPG."
        else
          git commit -m "Auto-update EPG data [skip ci]"
          git push
        fi
